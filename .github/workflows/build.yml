name: Build and Deploy Next.js

on:
  push:
    branches: [ main ] # Triggert bij elke push naar de main-branch
  workflow_dispatch:   # Maakt handmatig starten mogelijk

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-index: '20' # Kies de Node.js versie die past bij jouw project
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js website
        run: npm run build
        env:
          NEXT_PUBLIC_EMAIL: ${{ secrets.NEXT_PUBLIC_EMAIL }}
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
          NEXT_PUBLIC_PHONE: ${{ secrets.NEXT_PUBLIC_PHONE }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}

      # Stap 1: Bestanden uploaden via SFTP
      - name: Upload files via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          ssh-key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          protocol: sftp
          local-dir: .next/ # Gebruik '.' voor een volledige Node-app, of 'out' bij 'output: export'
          server-dir: /home/node-portfolio/node-portfolio/.next/ # Het doelpad op jouw server

      # Stap 2: SSH-commando uitvoeren op dezelfde server
      - name: Execute remote SSH command
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "Bestanden succesvol geüpload!"
            echo "Restarting service..."
            sudo systemctl restart portfolio
            echo "Klaar!"